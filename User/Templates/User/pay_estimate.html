{% extends 'User/head.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4">
                <h3 class="text-center text-primary mb-4">Review Work Estimate</h3>
                <h6 class="text-center mb-4">Electrician: {{ booking.electrician.electrician_name }}</h6>
                <div class="alert alert-info">
                    <strong>Work Details / Items Bought:</strong><br>
                    {{ booking.estimate_details }}
                </div>
                <h4 class="text-center mt-3 text-success">Total Cost: ₹{{ booking.estimate_amount }}</h4>
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" name="action" value="accept" class="btn btn-success btn-lg">Accept Estimate</button>
                        <button type="submit" name="action" value="reject" class="btn btn-danger btn-lg">Reject Estimate</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
