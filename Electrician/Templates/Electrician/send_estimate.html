{% extends 'Electrician/head.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow rounded">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">Send Work & Parts Estimate</h4>
                </div>
                <div class="card-body p-4">
                    <form action="" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted">Client Name</label>
                            <input type="text" class="form-control" value="{{ booking.user.user_name }}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Original Request Details</label>
                            <textarea class="form-control" rows="2" readonly>{{ booking.work_details }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="estimate_details" class="form-label fw-bold">Estimate Breakdown / Items
                                Bought</label>
                            <textarea name="estimate_details" id="estimate_details" rows="5" class="form-control"
                                required placeholder="E.g., 2 wires purchased from store, labor cost..."></textarea>
                        </div>
                        <div class="mb-4">
                            <label for="estimate_amount" class="form-label fw-bold">Total Estimate Amount ($)</label>
                            <input type="number" step="0.01" class="form-control" name="estimate_amount"
                                id="estimate_amount" required placeholder="150.00">
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Send Estimate to User</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
