{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrician Registration - ElectriBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'Main/css/electribook.css' %}">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        .reg-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            padding: 3rem 0;
        }

        .reg-card {
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .reg-image-side {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .input-group-text,
        .form-control,
        .form-select {
            border-radius: 10px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
        }

        .btn-register {
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -10px rgba(13, 110, 253, 0.5);
        }

        .eb-navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: transparent;
        }

        .eb-logo {
            color: white;
        }

        .eb-logo span {
            color: #0d6efd;
        }
    </style>
</head>

<body>
    <nav class="navbar eb-navbar py-3">
        <div class="container">
            <a class="navbar-brand eb-logo" href="{% url 'Guest:index' %}">Electri<span>Book</span></a>
            <a href="{% url 'Guest:login' %}" class="btn btn-outline-light btn-sm">Already have an account?</a>
        </div>
    </nav>

    <div class="reg-wrap">
        <div class="container py-5 animate-slide-up">
            <div class="reg-card card border-0 mx-auto bg-white mt-4">
                <div class="row g-0">
                    <div class="col-md-5 reg-image-side d-none d-md-flex">
                        <lottie-player src="https://lottie.host/9542dae3-6b6e-4e79-a1c9-d765a3e3ac3d/40nQaTtacb.json"
                            background="transparent" speed="1" style="width: 100%; max-width: 300px; height: 300px;"
                            loop autoplay></lottie-player>
                        <h4 class="fw-bold mt-4 text-dark text-center">Join as an Electrician</h4>
                        <p class="text-muted text-center mt-2 px-3">Offer your services, manage bookings, and grow your
                            career with ElectriBook.</p>
                    </div>
                    <div class="col-md-7 p-4 p-md-5">
                        <div class="text-center mb-4 d-md-none">
                            <i class="bi bi-tools display-4 text-primary mb-2"></i>
                            <h2 class="fw-bold text-dark">Electrician Registration</h2>
                        </div>
                        <h2 class="fw-bold text-dark mb-4 d-none d-md-block">Electrician Register</h2>

                        <form action="" method="POST" enctype="multipart/form-data" class="row g-3">
                            {% csrf_token %}

                            <div class="col-md-6 mb-2">
                                <label class="form-label fw-semibold small">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-person text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="txt_regname"
                                        placeholder="John Doe" required pattern="^[A-Z]+[a-zA-Z ]*$"
                                        title="Name allows only alphabets, spaces, and first letter must be capital">
                                </div>
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label fw-semibold small">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" name="txt_regemail"
                                        placeholder="john@example.com" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label fw-semibold small">Contact Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-telephone text-muted"></i></span>
                                    <input type="tel" class="form-control border-start-0" name="txt_regcontact"
                                        placeholder="9876543210" required pattern="[7-9]{1}[0-9]{9}"
                                        title="Phone number must start with 7-9 and contain 10 digits">
                                </div>
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label fw-semibold small">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" name="txt_password"
                                        placeholder="Password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                        title="Must contain at least one number, one uppercase and lowercase letter, and at least 8 characters">
                                </div>
                            </div>

                            <div class="col-12 mb-2">
                                <label class="form-label fw-semibold small">Work Category</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-tags text-muted"></i></span>
                                    <select name="category" required id="category" class="form-select border-start-0">
                                        <option value="" disabled selected>Select Category</option>
                                        {% for i in WorkCategory %}
                                        <option value="{{ i.id }}">{{ i.work_category_name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="col-12 mb-2">
                                <label class="form-label fw-semibold small">Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-geo-alt text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="txt_regaddress"
                                        placeholder="123 Street, City" required>
                                </div>
                            </div>

                            <div class="col-md-4 mb-2">
                                <label class="form-label fw-semibold small">District</label>
                                <select name="district" required id="district" class="form-select">
                                    <option value="" disabled selected>Select</option>
                                    {% for i in District %}
                                    <option value="{{ i.id }}">{{ i.district_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-4 mb-2">
                                <label class="form-label fw-semibold small">Place</label>
                                <select name="place" required id="place" class="form-select">
                                    <option value="">Select</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-2">
                                <label class="form-label fw-semibold small">Local Place</label>
                                <select name="local_place" required id="local_place" class="form-select">
                                    <option value="">Select</option>
                                </select>
                            </div>

                            <div class="col-md-12 mb-2">
                                <label class="form-label fw-semibold small">Profile Photo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-image text-muted"></i></span>
                                    <input type="file" class="form-control border-start-0" name="txt_photo" required
                                        accept="image/*">
                                </div>
                            </div>

                            <div class="col-md-6 mb-2">
                                <label class="form-label fw-semibold small">Aadhar Card</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-person-vcard text-muted"></i></span>
                                    <input type="file" class="form-control border-start-0" name="txt_aadhar" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-semibold small">PCC Certificate</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-file-earmark-medical text-muted"></i></span>
                                    <input type="file" class="form-control border-start-0" name="txt_pcc" required>
                                </div>
                            </div>

                            <div class="col-12">
                                <button type="submit" name="btnsubmit" class="btn btn-primary w-100 btn-register">Create
                                    Electrician Account</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $("#district").change(function () {
            var did = $(this).val();
            var ur = "{% url 'Guest:ajaxplace' %}"
            $.ajax({
                url: ur,
                data: { did: did },
                success: function (data) {
                    $("#place").html(data);
                }
            });
        });
        $("#place").change(function () {
            var pid = $(this).val();
            var ur = "{% url 'Guest:ajaxlocalplace' %}"
            $.ajax({
                url: ur,
                data: { pid: pid },
                success: function (data) {
                    $("#local_place").html(data);
                }
            });
        });
    </script>
</body>

</html>
