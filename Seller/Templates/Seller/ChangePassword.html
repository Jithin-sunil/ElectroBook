{% extends 'Seller/head.html' %}
{% load static %}
{% block content %}

<section class="py-5">
  <div class="container">
    <h2 class="fw-bold text-dark mb-4"><i class="bi bi-key me-2"></i>Change Password</h2>
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card eb-card border-0 p-4">
          <form action="" method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="txt_oldpass" class="form-label fw-bold">Old Password</label>
              <input type="password" class="form-control" name="txt_oldpass" id="txt_oldpass" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number, one uppercase and lowercase letter, and 8+ characters">
            </div>
            <div class="mb-3">
              <label for="txt_newpass" class="form-label fw-bold">New Password</label>
              <input type="password" class="form-control" name="txt_newpass" id="txt_newpass" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number, one uppercase and lowercase letter, and 8+ characters">
            </div>
            <div class="mb-4">
              <label for="txt_conpass" class="form-label fw-bold">Confirm Password</label>
              <input type="password" class="form-control" name="txt_conpass" id="txt_conpass" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must match new password">
            </div>
            <button type="submit" name="btnsubmit" class="btn btn-primary w-100 py-2">Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
