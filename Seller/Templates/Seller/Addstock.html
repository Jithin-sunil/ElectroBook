{% extends 'Seller/head.html' %}
{% load static %}
{% block content %}

<section class="py-5">
  <div class="container">
    <h2 class="fw-bold text-dark mb-4"><i class="bi bi-plus-circle me-2"></i>Add Stock</h2>
    <div class="row">
      <div class="col-lg-4">
        <div class="card eb-card border-0 p-4">
          <form action="" method="post">
            {% csrf_token %}
            <div class="mb-4">
              <label for="txt_count" class="form-label fw-bold">Stock Count</label>
              <input type="number" class="form-control" name="txt_count" id="txt_count" required min="1" placeholder="Enter quantity">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Add Stock</button>
          </form>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card eb-card border-0 overflow-hidden">
          <div class="card-header bg-white py-3">
            <h5 class="fw-bold mb-0">Stock History</h5>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th class="py-3">#</th>
                    <th class="py-3">Count</th>
                  </tr>
                </thead>
                <tbody>
                  {% for i in stock %}
                  <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i.stock_count }}</td>
                  </tr>
                  {% empty %}
                  <tr>
                    <td colspan="2" class="text-center text-muted py-4">No stock entries yet.</td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <a href="{% url 'Seller:product' %}" class="btn btn-outline-primary mt-3"><i class="bi bi-arrow-left me-2"></i>Back to Products</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
