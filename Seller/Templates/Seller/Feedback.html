{% extends 'Seller/head.html' %}
{% load static %}
{% block content %}

<section class="py-5">
  <div class="container">
    <h2 class="fw-bold text-dark mb-4"><i class="bi bi-chat-text me-2"></i>Feedback</h2>
    <div class="row">
      <div class="col-lg-4">
        <div class="card eb-card border-0 p-4">
          <h5 class="fw-bold mb-3">Submit Feedback</h5>
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="txt_content" class="form-label">Your Feedback</label>
              <input type="text" class="form-control" name="txt_content" id="txt_content" required placeholder="Enter your feedback">
            </div>
            <button type="submit" name="btnsubmit" class="btn btn-primary w-100">Submit</button>
          </form>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card eb-card border-0 overflow-hidden">
          <div class="card-header bg-white py-3">
            <h5 class="fw-bold mb-0">Feedback List</h5>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th class="py-3">#</th>
                    <th class="py-3">Content</th>
                  </tr>
                </thead>
                <tbody>
                  {% for i in feedback %}
                  <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i.feedback_name }}</td>
                  </tr>
                  {% empty %}
                  <tr>
                    <td colspan="2" class="text-center text-muted py-4">No feedback yet.</td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
